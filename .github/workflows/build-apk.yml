name: 编译 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 复制网页到 Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/ 2>/dev/null || true
          cp sw.js android/app/src/main/assets/ 2>/dev/null || true

      - name: 生成 Gradle Wrapper
        run: |
          cd android
          # 生成gradlew脚本
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: 构建 Release APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleRelease --no-daemon -x lint

      - name: 签名并对齐 APK
        run: |
          # 生成调试密钥
          keytool -genkey -v -keystore release.keystore -alias pktrainer \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=PKTrainer, OU=Dev, O=Trainer, L=City, S=State, C=CN"
          # 签名
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore release.keystore -storepass android \
            android/app/build/outputs/apk/release/app-release-unsigned.apk pktrainer
          # 对齐
          find "$ANDROID_HOME" -name "zipalign" -type f 2>/dev/null | head -1 | xargs -I{} {} -v -p 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            翻前训练器yifan-v1.0.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 翻前训练器yifan-APK
          path: 翻前训练器yifan-v1.0.apk

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: 翻前训练器yifan-v*.apk
