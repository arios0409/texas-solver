name: 编译 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 复制网页到 Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/ 2>/dev/null || true
          cp sw.js android/app/src/main/assets/ 2>/dev/null || true

      - name: 生成 Gradle Wrapper
        run: |
          cd android
          # 生成gradlew脚本
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: 构建 Release APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleRelease --no-daemon -x lint

      - name: 签名并对齐 APK
        run: |
          # 安装 build-tools（包含 apksigner, zipalign）
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" 2>/dev/null || true
          
          # 找到构建工具目录
          BUILD_TOOLS=$(find "$ANDROID_HOME" -type d -name "34.0.0" 2>/dev/null | head -1)
          
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=app-aligned.apk
          FINAL=翻前训练器yifan-v1.0.apk
          
          # 1. 对齐（先对齐再签名）
          if [ -n "$BUILD_TOOLS" ] && [ -f "$BUILD_TOOLS/zipalign" ]; then
            "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
          else
            cp "$UNSIGNED" "$ALIGNED"
          fi
          
          # 2. 生成密钥库
          keytool -genkey -v -keystore release.keystore -alias pktrainer \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=PKTrainer, OU=Dev, O=Trainer, L=City, ST=State, C=CN"
          
          # 3. 使用 apksigner 签名（正确的现代方式）
          if [ -n "$BUILD_TOOLS" ] && [ -f "$BUILD_TOOLS/apksigner" ]; then
            "$BUILD_TOOLS/apksigner" sign --ks release.keystore \
              --ks-pass pass:android --key-pass pass:android \
              --ks-key-alias pktrainer \
              --out "$FINAL" "$ALIGNED"
          else
            # 降级使用 jarsigner
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore release.keystore -storepass android \
              "$ALIGNED" pktrainer
            mv "$ALIGNED" "$FINAL"
          fi
          
          # 4. 验证签名
          if [ -n "$BUILD_TOOLS" ] && [ -f "$BUILD_TOOLS/apksigner" ]; then
            "$BUILD_TOOLS/apksigner" verify "$FINAL" && echo "签名验证通过 ✅" || echo "签名验证失败 ❌"
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 翻前训练器yifan-APK
          path: 翻前训练器yifan-v1.0.apk

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: 翻前训练器yifan-v*.apk
